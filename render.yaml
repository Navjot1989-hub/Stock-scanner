# Render Blueprint for the StockScan India backend (FastAPI).
# Deploy: push to GitHub, then New → Blueprint on https://render.com and pick this repo.
services:
  - type: web
    name: stockscan-india-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CORS_ORIGINS
        value: "*"            # set to your Vercel URL once deployed
      - key: UNIVERSE_TTL_SECONDS
        value: "3600"
